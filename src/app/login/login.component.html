<section class="auth-page">
  <div class="auth-card">
    <h1>{{ mode === 'login' ? 'Sign in to continue' : 'Create your account' }}</h1>

    <div class="mode-tabs">
      <button type="button" [class.active]="mode === 'login'" (click)="switchMode('login')">Sign in</button>
      <button type="button" [class.active]="mode === 'register'" (click)="switchMode('register')">Register</button>
    </div>

    <form *ngIf="mode === 'login'; else registerTemplate" class="auth-form" autocomplete="off" (ngSubmit)="submit()">
      <label>
        Email
        <input [(ngModel)]="loginForm.email" name="loginEmail" type="email" autocomplete="off" autocapitalize="off" spellcheck="false" required />
      </label>
      <label>
        Password
        <input [(ngModel)]="loginForm.password" name="loginPassword" type="password" autocomplete="new-password" required />
      </label>
      <button type="submit" class="primary-btn">Sign in</button>
    </form>

    <ng-template #registerTemplate>
      <form class="auth-form" autocomplete="off" (ngSubmit)="submit()">
        <label>
          Name
          <input [(ngModel)]="registerForm.name" name="registerName" autocomplete="off" required />
        </label>
        <label>
          Email
          <input [(ngModel)]="registerForm.email" name="registerEmail" type="email" autocomplete="off" autocapitalize="off" spellcheck="false" required />
        </label>
        <label>
          Password
          <input [(ngModel)]="registerForm.password" name="registerPassword" type="password" autocomplete="new-password" required />
        </label>
        <label>
          Role
          <select [(ngModel)]="registerForm.role" name="registerRole">
            <option value="user">User</option>
            <option value="contributor">Contributor</option>
          </select>
        </label>
        <button type="submit" class="primary-btn">Create account</button>
      </form>
    </ng-template>

    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</section>
