<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/">Mzansi<span>Kitchen</span></a>
    <nav class="nav-links">
      <a routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">Home</a>
      <a *ngIf="canUpload" routerLink="/upload" routerLinkActive="active">Upload</a>
      <a *ngIf="isAuthenticated" routerLink="/profile" routerLinkActive="active">Profile</a>
      <a *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active">Admin</a>
    </nav>
    <div class="auth-actions">
      <span class="welcome">{{ displayName }}</span>
      <a *ngIf="!isAuthenticated" class="auth-link" routerLink="/login">Sign in</a>
      <button *ngIf="isAuthenticated" type="button" class="auth-link" (click)="logout()">Sign out</button>
      <a class="profile-chip" [routerLink]="isAuthenticated ? '/profile' : '/login'">{{ avatar }}</a>
    </div>
  </header>
  <main class="page-shell">
    <router-outlet></router-outlet>
  </main>
</div>
